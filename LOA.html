<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherium Outpost - Fate-Style Click-to-Move</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #0a0a0a; 
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #top-bar {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 2px solid #d4af37;
            border-radius: 8px;
            padding: 10px 30px;
            color: #d4af37;
            font-size: 18px;
            text-shadow: 0 0 10px #d4af37;
            pointer-events: auto;
        }
        #controls {
            position: absolute;
            bottom: 20px; left: 20px;
            color: #888;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #333;
        }
        #interaction-prompt {
            position: absolute;
            bottom: 100px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 2px solid #d4af37;
            color: #fff;
            padding: 15px 30px;
            border-radius: 5px;
            display: none;
            pointer-events: auto;
            cursor: pointer;
        }
        #interaction-prompt:hover { background: rgba(212,175,55,0.2); }
        .steampunk-cog {
            position: absolute;
            width: 30px; height: 30px;
            border: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div id="top-bar">⚙ AETHERIUM OUTPOST ⚙</div>
        <div id="controls">
            [L-CLICK] Move | [SHIFT] Run | [E] Interact | [Mouse] Rotate Camera
        </div>
        <div id="interaction-prompt">Press E to Engage</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ═══════════════════════════════════════════════════════════════
        // AETHERIUM OUTPOST - Core Engine
        // ═══════════════════════════════════════════════════════════════

        class AetheriumEngine {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.controls = null;
                this.player = null;
                this.world = null;
                this.input = null;
                this.ui = null;
                this.clock = new THREE.Clock();
                this.entities = [];
                this.interactables = [];
                
                this.init();
            }

            init() {
                this.setupScene();
                this.setupLighting();
                this.setupWorld();
                this.setupPlayer();
                this.setupInput();
                this.setupUI();
                this.animate();
            }

            // ═══════════════════════════════════════════════════════════════
            // SCENE & RENDERING
            // ═══════════════════════════════════════════════════════════════

            setupScene() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x1a1a2e);
                this.scene.fog = new THREE.Fog(0x1a1a2e, 20, 80);

                this.camera = new THREE.PerspectiveCamera(
                    45, 
                    window.innerWidth / window.innerHeight, 
                    0.1, 
                    1000
                );
                this.camera.position.set(30, 25, 30);
                this.camera.lookAt(0, 0, 0);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.getElementById('game-container').appendChild(this.renderer.domElement);

                // Orbit controls (Fate-style camera)
                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxPolarAngle = Math.PI / 2.2;
                this.controls.minDistance = 10;
                this.controls.maxDistance = 60;
                this.controls.target.set(0, 0, 0);

                window.addEventListener('resize', () => this.onResize());
            }

            setupLighting() {
                // Ambient - steampunk mood
                const ambient = new THREE.AmbientLight(0xffd700, 0.3);
                this.scene.add(ambient);

                // Main directional (sun/moon)
                const sun = new THREE.DirectionalLight(0xffaa44, 0.8);
                sun.position.set(50, 50, 30);
                sun.castShadow = true;
                sun.shadow.mapSize.width = 2048;
                sun.shadow.mapSize.height = 2048;
                sun.shadow.camera.near = 0.5;
                sun.shadow.camera.far = 500;
                sun.shadow.camera.left = -50;
                sun.shadow.camera.right = 50;
                sun.shadow.camera.top = 50;
                sun.shadow.camera.bottom = -50;
                this.scene.add(sun);

                // Rim lighting for drama
                const rim = new THREE.DirectionalLight(0x4444ff, 0.4);
                rim.position.set(-30, 20, -30);
                this.scene.add(rim);

                // Point lights for atmosphere (street lamps)
                this.createStreetLamp(10, 0, 10, 0xff6600);
                this.createStreetLamp(-10, 0, -10, 0xff6600);
                this.createStreetLamp(10, 0, -10, 0xff6600);
                this.createStreetLamp(-10, 0, 10, 0xff6600);
            }

            createStreetLamp(x, y, z, color) {
                const geometry = new THREE.SphereGeometry(0.5, 16, 16);
                const material = new THREE.MeshBasicMaterial({ 
                    color: color,
                    transparent: true,
                    opacity: 0.8
                });
                const lamp = new THREE.Mesh(geometry, material);
                lamp.position.set(x, y + 4, z);
                
                const pointLight = new THREE.PointLight(color, 2, 15);
                pointLight.position.set(x, y + 4, z);
                
                this.scene.add(lamp);
                this.scene.add(pointLight);
            }

            // ═══════════════════════════════════════════════════════════════
            // WORLD GENERATION (Procedural Town)
            // ═══════════════════════════════════════════════════════════════

            setupWorld() {
                this.world = new WorldGenerator(this.scene);
                this.interactables = this.world.interactables;
            }

            // ═══════════════════════════════════════════════════════════════
            // PLAYER SYSTEM
            // ═══════════════════════════════════════════════════════════════

            setupPlayer() {
                this.player = new Player(this.scene, this.camera);
                this.entities.push(this.player);
            }

            // ═══════════════════════════════════════════════════════════════
            // INPUT HANDLING
            // ═══════════════════════════════════════════════════════════════

            setupInput() {
                this.input = new InputManager(this);
            }

            // ═══════════════════════════════════════════════════════════════
            // UI SYSTEM
            // ═══════════════════════════════════════════════════════════════

            setupUI() {
                this.ui = new UIManager();
            }

            // ═══════════════════════════════════════════════════════════════
            // MAIN LOOP
            // ═══════════════════════════════════════════════════════════════

            animate() {
                requestAnimationFrame(() => this.animate());
                
                const delta = this.clock.getDelta();
                
                this.controls.update();
                
                // Update all entities
                this.entities.forEach(entity => entity.update(delta));
                
                // Check interactions
                this.checkInteractions();
                
                this.renderer.render(this.scene, this.camera);
            }

            checkInteractions() {
                let nearInteractable = null;
                const playerPos = this.player.mesh.position;
                
                for (const obj of this.interactables) {
                    const dist = playerPos.distanceTo(obj.position);
                    if (dist < 3) {
                        nearInteractable = obj;
                        break;
                    }
                }
                
                this.ui.showPrompt(nearInteractable);
                this.player.nearInteractable = nearInteractable;
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // WORLD GENERATOR - Procedural Town Layout
        // ═══════════════════════════════════════════════════════════════

        class WorldGenerator {
            constructor(scene) {
                this.scene = scene;
                this.interactables = [];
                this.generate();
            }

            generate() {
                this.createTerrain();
                this.createBuildings();
                this.createDecorations();
                this.createNPCs();
            }

            createTerrain() {
                // Main ground
                const geometry = new THREE.PlaneGeometry(100, 100, 50, 50);
                
                // Add some noise to vertices for rolling hills
                const positions = geometry.attributes.position;
                for (let i = 0; i < positions.count; i++) {
                    const x = positions.getX(i);
                    const y = positions.getY(i);
                    const z = Math.sin(x * 0.1) * Math.cos(y * 0.1) * 1.5;
                    positions.setZ(i, z);
                }
                geometry.computeVertexNormals();

                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x2d4a2d,
                    roughness: 0.8,
                    metalness: 0.1
                });
                
                const ground = new THREE.Mesh(geometry, material);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                // Pathways
                this.createPath(0, 0, 20, 2); // Main path
                this.createPath(0, 0, 2, 20); // Cross path
            }

            createPath(x, z, width, length) {
                const geometry = new THREE.PlaneGeometry(width, length);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x8b7355,
                    roughness: 0.9 
                });
                const path = new THREE.Mesh(geometry, material);
                path.rotation.x = -Math.PI / 2;
                path.position.set(x, 0.05, z);
                path.receiveShadow = true;
                this.scene.add(path);
            }

            createBuildings() {
                // Smithy (north)
                this.createBuilding(0, -15, 'smithy', 0xd4af37);
                // Tavern (east)
                this.createBuilding(15, 0, 'tavern', 0x8b4513);
                // General Store (west)
                this.createBuilding(-15, 0, 'store', 0x4682b4);
                // Church (south)
                this.createBuilding(0, 15, 'church', 0xf5f5dc);
            }

            createBuilding(x, z, type, color) {
                const group = new THREE.Group();
                group.position.set(x, 0, z);

                // Base structure
                const width = type === 'church' ? 8 : 6;
                const depth = type === 'church' ? 12 : 6;
                const height = type === 'church' ? 8 : 5;

                const geometry = new THREE.BoxGeometry(width, height, depth);
                const material = new THREE.MeshStandardMaterial({ 
                    color: color,
                    roughness: 0.7,
                    metalness: 0.3
                });
                const building = new THREE.Mesh(geometry, material);
                building.position.y = height / 2;
                building.castShadow = true;
                building.receiveShadow = true;
                group.add(building);

                // Roof
                const roofGeo = type === 'church' 
                    ? new THREE.ConeGeometry(6, 4, 4)
                    : new THREE.ConeGeometry(5, 3, 4);
                const roofMat = new THREE.MeshStandardMaterial({ color: 0x4a4a4a });
                const roof = new THREE.Mesh(roofGeo, roofMat);
                roof.position.y = height + (type === 'church' ? 2 : 1.5);
                roof.rotation.y = Math.PI / 4;
                group.add(roof);

                // Door
                const doorGeo = new THREE.BoxGeometry(2, 3, 0.5);
                const doorMat = new THREE.MeshStandardMaterial({ color: 0x3d2817 });
                const door = new THREE.Mesh(doorGeo, doorMat);
                door.position.set(0, 1.5, depth/2 + 0.25);
                group.add(door);

                // Steampunk gears (decorative)
                this.addGears(group, width, height, depth);

                // Interaction trigger
                const triggerGeo = new THREE.BoxGeometry(width + 2, height, depth + 2);
                const triggerMat = new THREE.MeshBasicMaterial({ visible: false });
                const trigger = new THREE.Mesh(triggerGeo, triggerMat);
                trigger.position.y = height / 2;
                trigger.userData = { type: 'building', name: type };
                this.interactables.push(trigger);
                group.add(trigger);

                this.scene.add(group);
            }

            addGears(parent, w, h, d) {
                for (let i = 0; i < 3; i++) {
                    const gearGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 8);
                    const gearMat = new THREE.MeshStandardMaterial({ 
                        color: 0xb87333,
                        metalness: 0.8,
                        roughness: 0.2
                    });
                    const gear = new THREE.Mesh(gearGeo, gearMat);
                    gear.rotation.x = Math.PI / 2;
                    gear.position.set(
                        (Math.random() - 0.5) * w * 0.8,
                        h * 0.3 + Math.random() * h * 0.4,
                        d/2 + 0.3
                    );
                    parent.add(gear);
                }
            }

            createDecorations() {
                // Trees
                for (let i = 0; i < 20; i++) {
                    const x = (Math.random() - 0.5) * 80;
                    const z = (Math.random() - 0.5) * 80;
                    // Keep clear of center town
                    if (Math.abs(x) < 20 && Math.abs(z) < 20) continue;
                    this.createTree(x, z);
                }

                // Rocks
                for (let i = 0; i < 15; i++) {
                    const x = (Math.random() - 0.5) * 90;
                    const z = (Math.random() - 0.5) * 90;
                    this.createRock(x, z);
                }

                // Fate Weaver stall (your LAO DNA)
                this.createFateWeaver(8, 8);
            }

            createTree(x, z) {
                const group = new THREE.Group();
                group.position.set(x, 0, z);

                // Trunk
                const trunkGeo = new THREE.CylinderGeometry(0.5, 0.7, 3, 6);
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 1.5;
                trunk.castShadow = true;
                group.add(trunk);

                // Leaves (low-poly style)
                const leavesGeo = new THREE.ConeGeometry(2.5, 5, 6);
                const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
                const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                leaves.position.y = 4.5;
                leaves.castShadow = true;
                group.add(leaves);

                this.scene.add(group);
            }

            createRock(x, z) {
                const geometry = new THREE.DodecahedronGeometry(Math.random() * 1 + 0.5);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x808080,
                    roughness: 0.9 
                });
                const rock = new THREE.Mesh(geometry, material);
                rock.position.set(x, 0.5, z);
                rock.castShadow = true;
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                this.scene.add(rock);
            }

            createFateWeaver(x, z) {
                const group = new THREE.Group();
                group.position.set(x, 0, z);

                // Table
                const tableGeo = new THREE.BoxGeometry(3, 1, 2);
                const tableMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
                const table = new THREE.Mesh(tableGeo, tableMat);
                table.position.y = 0.5;
                group.add(table);

                // Mystic orb
                const orbGeo = new THREE.SphereGeometry(0.5, 16, 16);
                const orbMat = new THREE.MeshBasicMaterial({ 
                    color: 0x00ffff,
                    transparent: true,
                    opacity: 0.8
                });
                const orb = new THREE.Mesh(orbGeo, orbMat);
                orb.position.y = 1.5;
                
                // Pulse animation
                orb.userData.animate = (time) => {
                    const scale = 1 + Math.sin(time * 3) * 0.2;
                    orb.scale.set(scale, scale, scale);
                };
                
                group.add(orb);

                // Interaction
                const trigger = new THREE.Mesh(
                    new THREE.BoxGeometry(4, 3, 3),
                    new THREE.MeshBasicMaterial({ visible: false })
                );
                trigger.position.y = 1.5;
                trigger.userData = { type: 'fate_weaver', name: 'Fate Weaver' };
                this.interactables.push(trigger);
                group.add(trigger);

                this.scene.add(group);
            }

            createNPCs() {
                // Static NPCs for now
                this.createNPC(-5, -5, 'villager', 0xffccaa);
                this.createNPC(5, -5, 'merchant', 0xaa88ff);
                this.createNPC(-5, 5, 'guard', 0x888888);
            }

            createNPC(x, z, type, color) {
                const group = new THREE.Group();
                group.position.set(x, 0, z);

                // Body
                const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.8, 8);
                const bodyMat = new THREE.MeshStandardMaterial({ color: color });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 0.9;
                body.castShadow = true;
                group.add(body);

                // Head
                const headGeo = new THREE.SphereGeometry(0.4, 8, 8);
                const headMat = new THREE.MeshStandardMaterial({ color: color });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 2;
                group.add(head);

                // Interaction
                const trigger = new THREE.Mesh(
                    new THREE.CylinderGeometry(1, 1, 3),
                    new THREE.MeshBasicMaterial({ visible: false })
                );
                trigger.position.y = 1.5;
                trigger.userData = { type: 'npc', name: type };
                this.interactables.push(trigger);
                group.add(trigger);

                this.scene.add(group);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // PLAYER CONTROLLER - Fate-Style Click-to-Move
        // ═══════════════════════════════════════════════════════════════

        class Player {
            constructor(scene, camera) {
                this.scene = scene;
                this.camera = camera;
                this.mesh = null;
                this.targetPosition = null;
                this.speed = 5;
                this.runSpeed = 10;
                this.isRunning = false;
                this.nearInteractable = null;
                
                this.createMesh();
            }

            createMesh() {
                const group = new THREE.Group();

                // Body (placeholder for your imported model)
                const bodyGeo = new THREE.CapsuleGeometry(0.5, 1.5, 4, 8);
                const bodyMat = new THREE.MeshStandardMaterial({ 
                    color: 0x4682b4,
                    metalness: 0.5,
                    roughness: 0.5
                });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 1.25;
                body.castShadow = true;
                group.add(body);

                // Head
                const headGeo = new THREE.SphereGeometry(0.4, 8, 8);
                const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 2.3;
                group.add(head);

                // Selection ring
                const ringGeo = new THREE.RingGeometry(0.6, 0.8, 16);
                const ringMat = new THREE.MeshBasicMaterial({ 
                    color: 0xd4af37,
                    transparent: true,
                    opacity: 0.5,
                    side: THREE.DoubleSide
                });
                this.selectionRing = new THREE.Mesh(ringGeo, ringMat);
                this.selectionRing.rotation.x = -Math.PI / 2;
                this.selectionRing.position.y = 0.1;
                this.selectionRing.visible = false;
                group.add(this.selectionRing);

                this.mesh = group;
                this.scene.add(this.mesh);
            }

            moveTo(point) {
                this.targetPosition = point.clone();
                this.targetPosition.y = this.getTerrainHeight(point.x, point.z);
                this.selectionRing.visible = true;
            }

            getTerrainHeight(x, z) {
                // Match terrain generation formula
                return Math.sin(x * 0.1) * Math.cos(z * 0.1) * 1.5;
            }

            interact() {
                if (this.nearInteractable) {
                    const data = this.nearInteractable.userData;
                    console.log('Interacting with:', data);
                    
                    switch(data.type) {
                        case 'fate_weaver':
                            this.openFateWeaver();
                            break;
                        case 'building':
                            this.enterBuilding(data.name);
                            break;
                        case 'npc':
                            this.talkToNPC(data.name);
                            break;
                    }
                }
            }

            openFateWeaver() {
                alert('🎲 FATE WEAVER 🎲\n\nTest your luck!\n\n[This is where your LAO gambling DNA lives]');
            }

            enterBuilding(name) {
                console.log('Entering:', name);
                // Transition to interior scene
            }

            talkToNPC(name) {
                alert(`Talking to ${name}...\n\n[AI NPC detection logic goes here]`);
            }

            update(delta) {
                if (this.targetPosition) {
                    const currentPos = this.mesh.position;
                    const direction = new THREE.Vector3()
                        .subVectors(this.targetPosition, currentPos);
                    direction.y = 0;
                    
                    const distance = direction.length();
                    
                    if (distance < 0.1) {
                        this.targetPosition = null;
                        this.selectionRing.visible = false;
                    } else {
                        direction.normalize();
                        const speed = this.isRunning ? this.runSpeed : this.speed;
                        const moveDistance = Math.min(distance, speed * delta);
                        
                        currentPos.add(direction.multiplyScalar(moveDistance));
                        currentPos.y = this.getTerrainHeight(currentPos.x, currentPos.z);
                        
                        // Face movement direction
                        this.mesh.lookAt(
                            currentPos.x + direction.x,
                            currentPos.y,
                            currentPos.z + direction.z
                        );
                    }
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // INPUT MANAGER
        // ═══════════════════════════════════════════════════════════════

        class InputManager {
            constructor(engine) {
                this.engine = engine;
                this.raycaster = new THREE.Raycaster();
                this.mouse = new THREE.Vector2();
                this.isShiftDown = false;

                this.setupListeners();
            }

            setupListeners() {
                window.addEventListener('mousedown', (e) => this.onMouseDown(e));
                window.addEventListener('keydown', (e) => this.onKeyDown(e));
                window.addEventListener('keyup', (e) => this.onKeyUp(e));
            }

            onMouseDown(event) {
                if (event.button !== 0) return; // Left click only
                
                this.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                this.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                this.raycaster.setFromCamera(this.mouse, this.engine.camera);
                
                // Raycast against ground
                const intersects = this.raycaster.intersectObjects(
                    this.engine.scene.children,
                    true
                );

                for (const hit of intersects) {
                    // Check if clicked on interactable first
                    if (hit.object.userData.type) {
                        this.engine.player.moveTo(hit.object.position);
                        return;
                    }
                    
                    // Otherwise move to ground point
                    if (hit.point) {
                        this.engine.player.moveTo(hit.point);
                        return;
                    }
                }
            }

            onKeyDown(event) {
                switch(event.code) {
                    case 'ShiftLeft':
                    case 'ShiftRight':
                        this.engine.player.isRunning = true;
                        break;
                    case 'KeyE':
                        this.engine.player.interact();
                        break;
                }
            }

            onKeyUp(event) {
                switch(event.code) {
                    case 'ShiftLeft':
                    case 'ShiftRight':
                        this.engine.player.isRunning = false;
                        break;
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // UI MANAGER
        // ═══════════════════════════════════════════════════════════════

        class UIManager {
            constructor() {
                this.prompt = document.getElementById('interaction-prompt');
            }

            showPrompt(interactable) {
                if (interactable) {
                    const name = interactable.userData.name || 'Object';
                    this.prompt.textContent = `Press E to interact with ${name}`;
                    this.prompt.style.display = 'block';
                } else {
                    this.prompt.style.display = 'none';
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════════

        const game = new AetheriumEngine();
    </script>
